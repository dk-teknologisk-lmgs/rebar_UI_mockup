</div>

<script>
  document.querySelectorAll('.user-menu').forEach(menu => {
    const btn = menu.querySelector('.user-dropdown-btn');
    const panel = menu.querySelector('.user-dropdown-panel');

    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      document.querySelectorAll('.user-dropdown-panel').forEach(p => {
        if (p !== panel) p.classList.remove('open');
      });
      panel.classList.toggle('open');
    });
  });

  document.addEventListener('click', () => {
    document.querySelectorAll('.user-dropdown-panel').forEach(panel => {
      panel.classList.remove('open');
    });
  });
</script>
</body>
